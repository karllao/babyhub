services:
  babyhub:
    image: karllao/babyhub:latest
    # 本地构建可改为:
    # build: .
    container_name: babyhub
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ACCESS_CODE: baby2026
      SESSION_SECRET: please-change-this-to-a-long-random-string
      DB_PATH: /data/baby.db
      TZ: Asia/Shanghai
    volumes:
      - ./data:/data
